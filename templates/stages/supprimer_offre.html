{% extends 'base.html' %}
{% block title %}Supprimer offre{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">🗑️ Supprimer l'offre</h4>
            </div>
            <div class="card-body">
                <p>Confirmer la suppression de :</p>
                <div class="alert alert-warning">
                    <strong>{{ offre.titre }}</strong><br>
                    {{ offre.description|truncatechars:100 }}
                </div>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Confirmer</button>
                    <a href="{% url 'liste_offres_service' %}" class="btn btn-secondary">Annuler</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
