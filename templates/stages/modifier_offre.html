{% extends 'base.html' %}
{% block title %}Modifier offre{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-warning">
                <h4 class="mb-0">✏️ Modifier l'offre</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Titre</label>
                        <input type="text" name="titre" class="form-control" value="{{ offre.titre }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="4" required>{{ offre.description }}</textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Lieu</label>
                            <input type="text" name="lieu" class="form-control" value="{{ offre.lieu }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Durée</label>
                            <input type="text" name="duree" class="form-control" value="{{ offre.duree }}" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Date limite</label>
                            <input type="date" name="date_limite" class="form-control" value="{{ offre.date_limite|date:'Y-m-d' }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="form-check mt-4">
                                <input type="checkbox" name="active" class="form-check-input" {% if offre.active %}checked{% endif %}>
                                <label class="form-check-label">Offre active</label>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-warning">Enregistrer</button>
                    <a href="{% url 'liste_offres_service' %}" class="btn btn-secondary">Annuler</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
